# Ontotext GraphDB setup for KGAlignment inspection.

services:
  preload:
    container_name: graphdb-preload-kgalign-merged
    image: ontotext/graphdb:11.1.3
    profiles: ["preload"]

    mem_limit: 120g
    mem_reservation: 120g

    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        dst=/tmp/graphdb-import-kgalign-merged-rdf-only
        rm -rf "$$dst"
        mkdir -p "$$dst/semopenalex" "$$dst/yago" "$$dst/alignments"

        semopenalex=/opt/graphdb/graphdb-import/semopenalex
        find "$$semopenalex" -type f \( \
          -name "*.trig.gz" -o -name "*.trig" -o \
          -name "*.ttl.gz" -o -name "*.ttl" -o \
          -name "*.nt.gz" -o -name "*.nt" -o \
          -name "*.nq.gz" -o -name "*.nq" -o \
          -name "*.ntx" \
        \) -exec sh -c '
          src="$$1"
          dst="$$2"
          shift 2
          for f do
            rel=$${f#"$$src"/}
            mkdir -p "$$dst/$$(dirname "$$rel")"
            ln -s "$$f" "$$dst/$$rel"
          done
        ' sh "$$semopenalex" "$$dst/semopenalex" {} +

        yago=/opt/graphdb/graphdb-import/yago
        for f in \
          yago-beyond-wikipedia.ttl \
          yago-facts.ttl \
          yago-schema.ttl \
          yago-taxonomy.ttl
        do
          ln -s "$$yago/$$f" "$$dst/yago/$$f"
        done

        ln -s /opt/graphdb/graphdb-import/alignments/final_alignments.trig \
          "$$dst/alignments/final_alignments.trig"

        /opt/graphdb/dist/bin/importrdf preload \
          --chunk 10m --force --recursive --parsing-tasks 24 \
          --recovery-point-interval 3600 \
          --config-file /opt/graphdb/kgalign_merged-config.ttl \
          "$$dst"

    environment:
      GDB_JAVA_OPTS: >-
        -Xms112g
        -Xmx112g
        -Dgraphdb.home=/opt/graphdb/home
        -Dgraphdb.workbench.importDirectory=/opt/graphdb/graphdb-import

    volumes:
      - ./graphdb-home:/opt/graphdb/home:Z
      - ../01_raw/semopenalex:/opt/graphdb/graphdb-import/semopenalex:Z
      - ../01_raw/yago:/opt/graphdb/graphdb-import/yago:Z
      - ../07_export/rdf_alignments:/opt/graphdb/graphdb-import/alignments:Z
      - ./kgalign_merged-config.ttl:/opt/graphdb/kgalign_merged-config.ttl:Z,ro

  graphdb:
    container_name: graphdb
    image: ontotext/graphdb:11.1.3
    restart: unless-stopped

    ports:
      - "7200:7200"

    environment:
      GDB_JAVA_OPTS: >-
        -Xms32g
        -Xmx112g
        -Dgraphdb.home=/opt/graphdb/home

    volumes:
      - ./graphdb-home:/opt/graphdb/home:Z
